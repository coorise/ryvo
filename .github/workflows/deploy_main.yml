name: Deploy production to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod-vps
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Resolve PROD web build secrets (GitHub secrets or VPS fallback)
        env:
          ANON_FROM_SECRET: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          MAPS_FROM_SECRET: ${{ secrets.PROD_GOOGLE_MAPS_API_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || 22 }}
        run: |
          set -euo pipefail

          ANON="${ANON_FROM_SECRET:-}"
          MAPS="${MAPS_FROM_SECRET:-}"

          if [[ -n "$ANON" && -n "$MAPS" ]]; then
            echo "::notice::Using PROD_SUPABASE_ANON_KEY and PROD_GOOGLE_MAPS_API_KEY from GitHub secrets."
          else
            echo "::warning::Missing PROD secrets — reading from VPS over SSH where needed."
            if [[ -z "${VPS_HOST:-}" || -z "${VPS_USER:-}" || -z "${VPS_SSH_KEY:-}" ]]; then
              echo "::error::VPS fallback requires VPS_HOST, VPS_USER, and VPS_SSH_KEY."
              exit 1
            fi
            install -m 700 -d ~/.ssh
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_vps
            chmod 600 ~/.ssh/id_vps
            set +e
            VPS_SECRETS="$(
              ssh -i ~/.ssh/id_vps -p "${VPS_SSH_PORT}" -o StrictHostKeyChecking=accept-new "${VPS_USER}@${VPS_HOST}" \
                'bash -c '"'"'set -euo pipefail;
                  for p in "$HOME/Projects/Web/ryvo/server/supabase/.env" "$HOME/ryvo/server/supabase/.env" "/opt/ryvo/server/supabase/.env"; do
                    if [ -f "$p" ]; then
                      grep -E "^ANON_KEY=" "$p" | head -1 | cut -d= -f2- | sed "s/^/ANON_KEY=/" || true
                      grep -E "^GOOGLE_MAPS_API_KEY=" "$p" | head -1 | cut -d= -f2- | sed "s/^/GOOGLE_MAPS_API_KEY=/" || true
                      exit 0
                    fi
                  done
                  echo ANON_KEY=
                  echo GOOGLE_MAPS_API_KEY='"'"''
            )"
            ssh_rc=$?
            set -e
            if [[ "$ssh_rc" -ne 0 ]]; then
              echo "::error::SSH to VPS failed (exit $ssh_rc)."
              exit 1
            fi
            [[ -z "$ANON" ]] && ANON="$(printf '%s\n' "$VPS_SECRETS" | grep '^ANON_KEY=' | head -1 | cut -d= -f2- || true)"
            [[ -z "$MAPS" ]] && MAPS="$(printf '%s\n' "$VPS_SECRETS" | grep '^GOOGLE_MAPS_API_KEY=' | head -1 | cut -d= -f2- || true)"
          fi

          if [[ -z "$ANON" ]]; then
            echo "::error::PROD_SUPABASE_ANON_KEY not resolved."
            exit 1
          fi

          echo "::add-mask::${ANON}"
          echo "PROD_SUPABASE_ANON_KEY=${ANON}" >> "$GITHUB_ENV"
          if [[ -n "$MAPS" ]]; then
            echo "::add-mask::${MAPS}"
            echo "PROD_GOOGLE_MAPS_API_KEY=${MAPS}" >> "$GITHUB_ENV"
          else
            echo "::warning::PROD_GOOGLE_MAPS_API_KEY not set — admin map may not work."
          fi

      - name: Write .env.production for Next.js Docker build
        run: |
          set -euo pipefail
          ANON="${PROD_SUPABASE_ANON_KEY:-}"
          MAPS="${PROD_GOOGLE_MAPS_API_KEY:-}"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.agglomy.com"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON}"
            echo "NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.agglomy.com/functions/v1"
            echo "NEXT_PUBLIC_APP_ENV=production"
            [[ -n "$MAPS" ]] && echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${MAPS}"
          } > client/web/ryvo_admin/.env.production
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.agglomy.com"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON}"
            echo "NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.agglomy.com/functions/v1"
            echo "NEXT_PUBLIC_APP_ENV=production"
            [[ -n "$MAPS" ]] && echo "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${MAPS}"
          } > client/web/ryvo/.env.production

      - name: Build + push web admin image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo_admin
          file: ./client/web/ryvo_admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.agglomy.com
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.PROD_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.agglomy.com/functions/v1
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.PROD_GOOGLE_MAPS_API_KEY }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-web-admin:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-web-admin:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push web client image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo
          file: ./client/web/ryvo/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.agglomy.com
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.PROD_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.agglomy.com/functions/v1
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.PROD_GOOGLE_MAPS_API_KEY }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-web-client:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-web-client:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push functions gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/supabase/Dockerfile.ryvo-functions
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-functions:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-functions:prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS (prod stack)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DOCKER_USERNAME,DOCKER_TOKEN
          script_stop: true
          script: |
            bash -lc 'set -euo pipefail
            for d in "$HOME/Projects/Web/ryvo" "$HOME/ryvo" /opt/ryvo; do
              [[ -d "$d/.git" ]] && cd "$d" && break
            done
            pwd
            git fetch origin main dev
            git checkout -- network/caddy/Caddyfile.dev deploy/vps/compose/functions-router.dev.Caddyfile network/caddy/Caddyfile.prod deploy/vps/compose/functions-router.prod.Caddyfile 2>/dev/null || true
            git checkout main
            git pull --ff-only origin main
            bash deploy/vps/scripts/deploy-bluegreen.sh prod sha-${{ github.sha }}'

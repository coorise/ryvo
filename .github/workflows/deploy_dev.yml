name: Deploy dev to VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build + push web admin image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo_admin
          file: ./client/web/ryvo_admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ryvo-web-admin:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/ryvo-web-admin:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push web client image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo
          file: ./client/web/ryvo/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ryvo-web-client:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/ryvo-web-client:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push functions gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/supabase/Dockerfile.ryvo-functions
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ryvo-functions:sha-${{ github.sha }}
            ghcr.io/${{ github.repository }}/ryvo-functions:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS (dev stack)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            bash -lc 'set -euo pipefail
            cd ~/Projects/Web/ryvo
            git fetch origin dev && git checkout dev && git pull origin dev
            bash deploy/vps/scripts/deploy-bluegreen.sh dev sha-${{ github.sha }}'

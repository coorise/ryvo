name: Deploy dev to VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS (dev stack)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/Projects/Web/ryvo
            git fetch origin dev
            git checkout dev
            git pull origin dev
            test -f deploy/vps/.env.dev || { echo "Missing deploy/vps/.env.dev on VPS"; exit 1; }
            docker compose -f docker-compose.dev.yaml --env-file deploy/vps/.env.dev build --pull
            docker compose -f docker-compose.dev.yaml --env-file deploy/vps/.env.dev up -d
            docker compose -f docker-compose.dev.yaml exec -T caddy_dev caddy reload --config /etc/caddy/Caddyfile || true
            docker compose -f docker-compose.dev.yaml ps

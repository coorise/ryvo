name: Deploy dev to VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Docker Hub namespace (your DOCKER_USERNAME secret), e.g. coorise/ryvo-web-admin:tag
      IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build + push web admin image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo_admin
          file: ./client/web/ryvo_admin/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-web-admin:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-web-admin:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push web client image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo
          file: ./client/web/ryvo/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-web-client:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-web-client:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push functions gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/supabase/Dockerfile.ryvo-functions
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-functions:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-functions:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS (dev stack)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DOCKER_USERNAME,DOCKER_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/Projects/Web/ryvo
            git fetch origin dev && git checkout dev && git pull origin dev
            bash deploy/vps/scripts/deploy-bluegreen.sh dev sha-${{ github.sha }}

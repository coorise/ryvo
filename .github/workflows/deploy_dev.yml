name: Deploy dev to VPS

on:
  push:
    branches:
      - dev
  workflow_dispatch:

# Avoid overlapping VPS deploys (git pull / blue-green races).
concurrency:
  group: deploy-dev-vps
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Docker Hub namespace (your DOCKER_USERNAME secret), e.g. coorise/ryvo-web-admin:tag
      IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Resolve DEV_SUPABASE_ANON_KEY (secret or VPS fallback)
        env:
          ANON_FROM_SECRET: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || 22 }}
        run: |
          set -euo pipefail

          if [ -n "${ANON_FROM_SECRET:-}" ]; then
            echo "::notice::Using DEV_SUPABASE_ANON_KEY from GitHub secrets."
            echo "DEV_SUPABASE_ANON_KEY=${ANON_FROM_SECRET}" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::warning::DEV_SUPABASE_ANON_KEY secret is not set. Falling back to reading ANON_KEY from the VPS over SSH."

          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${VPS_SSH_KEY:-}" ]; then
            echo "::error::VPS fallback requires VPS_HOST, VPS_USER, and VPS_SSH_KEY secrets to be set."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_vps
          chmod 600 ~/.ssh/id_vps

          set +e
          ANON_FROM_VPS="$(
            ssh -i ~/.ssh/id_vps -p "${VPS_SSH_PORT}" -o StrictHostKeyChecking=accept-new "${VPS_USER}@${VPS_HOST}" \
              'bash -lc '"'"'set -euo pipefail;
                for p in "$HOME/Projects/Web/ryvo/server/supabase/.env" "$HOME/ryvo/server/supabase/.env" "/opt/ryvo/server/supabase/.env"; do
                  if [ -f "$p" ]; then
                    key="$(grep -E "^ANON_KEY=" "$p" | head -1 | cut -d= -f2- || true)"
                    if [ -n "$key" ]; then
                      echo "$key"
                      exit 0
                    fi
                  fi
                done
                echo ANON_KEY_NOT_FOUND
                exit 0'"'"''
          )"
          ssh_rc=$?
          set -e

          if [ "$ssh_rc" -ne 0 ]; then
            echo "::error::SSH to VPS failed while trying to read ANON_KEY (exit $ssh_rc)."
            exit 1
          fi

          if [ -z "${ANON_FROM_VPS:-}" ] || [ "${ANON_FROM_VPS}" = "ANON_KEY_NOT_FOUND" ]; then
            echo "::error::Could not read ANON_KEY from VPS. Ensure the repo exists on the VPS and server/supabase/.env contains ANON_KEY."
            exit 1
          fi

          echo "::add-mask::${ANON_FROM_VPS}"
          echo "DEV_SUPABASE_ANON_KEY=${ANON_FROM_VPS}" >> "$GITHUB_ENV"
          echo "::notice::Resolved DEV_SUPABASE_ANON_KEY from VPS."

      - name: Write .env.production for Next.js Docker build
        run: |
          set -euo pipefail
          ANON="${DEV_SUPABASE_ANON_KEY:-}"
          if [ -z "$ANON" ]; then
            echo "::error::DEV_SUPABASE_ANON_KEY not resolved (secret missing + VPS fallback failed)."
            exit 1
          fi
          for app in client/web/ryvo_admin client/web/ryvo; do
            {
              echo "NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.dev.agglomy.com"
              echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON}"
              echo "NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.dev.agglomy.com/functions/v1"
              echo "NEXT_PUBLIC_APP_ENV=development"
            } > "$app/.env.production"
          done

      - name: Build + push web admin image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo_admin
          file: ./client/web/ryvo_admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.dev.agglomy.com
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.DEV_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.dev.agglomy.com/functions/v1
            NEXT_PUBLIC_APP_ENV=development
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-web-admin:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-web-admin:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push web client image
        uses: docker/build-push-action@v6
        with:
          context: ./client/web/ryvo
          file: ./client/web/ryvo/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://ryvo-line-server.dev.agglomy.com
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.DEV_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_FUNCTIONS_URL=https://ryvo-line-server.dev.agglomy.com/functions/v1
            NEXT_PUBLIC_APP_ENV=development
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-web-client:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-web-client:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push functions gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/supabase/Dockerfile.ryvo-functions
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ryvo-functions:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ryvo-functions:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS (dev stack)
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: DOCKER_USERNAME,DOCKER_TOKEN
          script_stop: true
          script: |
            bash -lc 'set -euo pipefail
            for d in "$HOME/Projects/Web/ryvo" "$HOME/ryvo" /opt/ryvo; do
              [[ -d "$d/.git" ]] && cd "$d" && break
            done
            pwd
            git fetch origin dev && git checkout dev
            git checkout -- network/caddy/Caddyfile.dev deploy/vps/compose/functions-router.dev.Caddyfile 2>/dev/null || true
            git pull --ff-only origin dev
            bash deploy/vps/scripts/deploy-bluegreen.sh dev sha-${{ github.sha }}'

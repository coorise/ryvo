# Bunqueue — Ryvo tasks / cron (TCP server mode)
services:
  ryvo_bunqueue:
    image: ghcr.io/egeominotti/bunqueue:${BUNQUEUE_IMAGE_TAG:-latest}
    container_name: ${BUNQUEUE_CONTAINER_NAME:-ryvo_bunqueue}
    ports:
      - "${BUNQUEUE_HTTP_PORT:-6789}:6789"
      - "${BUNQUEUE_TCP_PORT:-6790}:6790"
    volumes:
      - ./data:/app/data
    user: "0:0"
    networks:
      - ryvo-net
    restart: unless-stopped

networks:
  ryvo-net:
    name: ryvo-net
    external: true

# Apache Kafka (KRaft) — Ryvo event bus
# Docs: https://hub.docker.com/r/apache/kafka
services:
  ryvo_kafka_broker:
    image: apache/kafka:${KAFKA_IMAGE_TAG:-latest}
    container_name: ${KAFKA_CONTAINER_NAME:-ryvo_kafka_broker}
    hostname: ${KAFKA_CONTAINER_NAME:-ryvo_kafka_broker}
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_CONTAINER_NAME:-ryvo_kafka_broker}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@${KAFKA_CONTAINER_NAME:-ryvo_kafka_broker}:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-3}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-ryvo-kafka-cluster-001}
    volumes:
      - ./data:/var/lib/kafka/data
    networks:
      - ryvo-net
    restart: unless-stopped

# Caddy edge (dev VPS) — ports 3400 admin / 3500 client / 8500 API
services:
  caddy_dev:
    image: caddy:2.10-alpine
    container_name: ryvo-caddy_dev
    restart: unless-stopped
    ports:
      - "${RYVO_ADMIN_PORT:-3400}:3400"
      - "${RYVO_CLIENT_PORT:-3500}:3500"
      - "${RYVO_API_PORT:-8500}:8500"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data_dev:/data
      - caddy_config_dev:/config
    networks:
      ryvo-net: {}
    depends_on:
      - ryvo-web-admin_dev
      - ryvo-web-client_dev
      - kong

volumes:
  caddy_data_dev:
  caddy_config_dev:

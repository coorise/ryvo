# Ryvo-Line — dev VPS (branch: dev)
# One command: docker compose -f docker-compose.dev.yaml --env-file deploy/vps/compose/.env.dev up -d --build
#
# Include order: dev overlay first, then base (Compose merge keeps overlay values).

name: ryvo-dev

networks:
  ryvo-net:
    name: ryvo-net-dev

include:
  - path: ./server/supabase/docker-compose.dev.yaml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.yml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.edge.yaml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.ryvo-functions.yaml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}

  - path: ./server/kafka/docker-compose.dev.yaml
    project_directory: ./server/kafka
    env_file: ${KAFKA_ENV_FILE:-./server/kafka/.env}
  - path: ./server/kafka/docker-compose.yml
    project_directory: ./server/kafka
    env_file: ${KAFKA_ENV_FILE:-./server/kafka/.env}

  - path: ./server/redis/docker-compose.dev.yaml
    project_directory: ./server/redis
    env_file: ${REDIS_ENV_FILE:-./server/redis/.env}
  - path: ./server/redis/docker-compose.yaml
    project_directory: ./server/redis
    env_file: ${REDIS_ENV_FILE:-./server/redis/.env}

  - path: ./server/bunqueue/docker-compose.dev.yaml
    project_directory: ./server/bunqueue
    env_file: ${BUNQUEUE_ENV_FILE:-./server/bunqueue/.env}
  - path: ./server/bunqueue/docker-compose.yaml
    project_directory: ./server/bunqueue
    env_file: ${BUNQUEUE_ENV_FILE:-./server/bunqueue/.env}

  - path: ./network/caddy/docker-compose.dev.yaml
    project_directory: ./network/caddy
  - path: ./deploy/vps/compose/app.bluegreen.dev.yaml
    project_directory: ./deploy/vps/compose

# Root-level overrides (include merge does not honor nested dev overlays reliably)
services:
  studio:
    container_name: supabase-studio_dev
  kong:
    container_name: supabase-kong_dev
  auth:
    container_name: supabase-auth_dev
  rest:
    container_name: supabase-rest_dev
  realtime:
    container_name: supabase-realtime_dev
  storage:
    container_name: supabase-storage_dev
  imgproxy:
    container_name: supabase-imgproxy_dev
  meta:
    container_name: supabase-meta_dev
  analytics:
    container_name: supabase-analytics_dev
  vector:
    container_name: supabase-vector_dev
  supavisor:
    container_name: supabase-pooler_dev
  db:
    container_name: supabase-db_dev

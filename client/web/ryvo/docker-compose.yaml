# Ryvo customer web — drivers & clients (local)
services:
  ryvo-web-client:
    build:
      context: .
      dockerfile: Dockerfile
      # Build network for bun install (default works for most; set DOCKER_BUILD_NETWORK=host if needed).
      network: ${DOCKER_BUILD_NETWORK:-default}
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8400}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_FUNCTIONS_URL: ${NEXT_PUBLIC_FUNCTIONS_URL:-http://localhost:8400/functions/v1}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    container_name: ryvo-web-client
    restart: unless-stopped
    networks:
      ryvo-net: {}
    depends_on:
      kong:
        condition: service_healthy
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

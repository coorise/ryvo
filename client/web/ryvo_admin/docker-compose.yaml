# Ryvo admin web (local)
services:
  ryvo-web-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8400}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_FUNCTIONS_URL: ${NEXT_PUBLIC_FUNCTIONS_URL:-http://localhost:8400/functions/v1}
        NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-development}
    container_name: ryvo-web-admin
    restart: unless-stopped
    networks:
      ryvo-net: {}
    depends_on:
      kong:
        condition: service_healthy
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

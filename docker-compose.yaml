# Ryvo-Line — local development
# Usage: docker compose up -d --build
#
# Ports: admin 3200 | client 3300 | API 8400 (via network/caddy)
# First time: bash scripts/ensure-env.sh

name: ryvo

include:
  - path: ./docker-compose.base.yaml
  - path: ./network/caddy/docker-compose.yaml
    project_directory: ./network/caddy
  - path: ./client/web/ryvo_admin/docker-compose.yaml
    project_directory: ./client/web/ryvo_admin
  - path: ./client/web/ryvo/docker-compose.yaml
    project_directory: ./client/web/ryvo

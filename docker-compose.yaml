# Ryvo-Line — single entry point (portable)
#
# First time on a new machine:
#   cp server/supabase/.env.example server/supabase/.env
#   cp server/kafka/.env.example server/kafka/.env
#   cp server/redis/.env.example server/redis/.env
#   cp server/bunqueue/.env.example server/bunqueue/.env
#   # or: bash scripts/ensure-env.sh
#
# Start (migrations + demo users run automatically):
#   docker compose up -d
#   # or: bash scripts/dev-up.sh
#
# Stop:
#   docker compose down
#
# E2E smoke (inside Docker network):
#   docker compose --profile smoke run --rm ryvo-smoke
#
# Requires Docker Compose v2.20+

name: ryvo

networks:
  ryvo-net:
    name: ryvo-net
    driver: bridge

include:
  - path: ./server/supabase/docker-compose.yml
    project_directory: ./server/supabase
    env_file: ./server/supabase/.env
  - path: ./server/supabase/docker-compose.s3.yml
    project_directory: ./server/supabase
    env_file: ./server/supabase/.env
  - path: ./server/supabase/docker-compose.ryvo.yml
    project_directory: ./server/supabase
    env_file: ./server/supabase/.env

  - path: ./server/kafka/docker-compose.yml
    project_directory: ./server/kafka
    env_file: ./server/kafka/.env
  - path: ./server/redis/docker-compose.yml
    project_directory: ./server/redis
    env_file: ./server/redis/.env
  - path: ./server/bunqueue/docker-compose.yaml
    project_directory: ./server/bunqueue
    env_file: ./server/bunqueue/.env

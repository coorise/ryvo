# Ryvo-Line — production VPS (branch: main)
# One command: ./scripts/ryvo-up.sh prod

name: ryvo

networks:
  ryvo-net:
    name: ryvo-net

include:
  - path: ./server/supabase/docker-compose.prod.yaml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.yml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.edge.yaml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.ryvo-functions.yaml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}
  - path: ./server/supabase/docker-compose.s3.yml
    project_directory: ./server/supabase
    env_file: ${SUPABASE_ENV_FILE:-./server/supabase/.env}

  - path: ./server/kafka/docker-compose.yml
    project_directory: ./server/kafka
    env_file: ${KAFKA_ENV_FILE:-./server/kafka/.env}
  - path: ./server/kafka/docker-compose.prod.yaml
    project_directory: ./server/kafka
    env_file: ${KAFKA_ENV_FILE:-./server/kafka/.env}

  - path: ./server/redis/docker-compose.yaml
    project_directory: ./server/redis
    env_file: ${REDIS_ENV_FILE:-./server/redis/.env}
  - path: ./server/redis/docker-compose.prod.yaml
    project_directory: ./server/redis
    env_file: ${REDIS_ENV_FILE:-./server/redis/.env}

  - path: ./server/bunqueue/docker-compose.yaml
    project_directory: ./server/bunqueue
    env_file: ${BUNQUEUE_ENV_FILE:-./server/bunqueue/.env}
  - path: ./server/bunqueue/docker-compose.prod.yaml
    project_directory: ./server/bunqueue
    env_file: ${BUNQUEUE_ENV_FILE:-./server/bunqueue/.env}

  - path: ./network/caddy/docker-compose.prod.yaml
    project_directory: ./network/caddy
  - path: ./deploy/vps/compose/app.bluegreen.prod.yaml
    project_directory: ./deploy/vps/compose

# Root-level overrides (include merge does not honor nested prod overlays reliably)
services:
  studio:
    container_name: supabase-studio_prod
  kong:
    container_name: supabase-kong_prod
  auth:
    container_name: supabase-auth_prod
  rest:
    container_name: supabase-rest_prod
  realtime:
    container_name: supabase-realtime_prod
  storage:
    container_name: supabase-storage_prod
  imgproxy:
    container_name: supabase-imgproxy_prod
  meta:
    container_name: supabase-meta_prod
  analytics:
    container_name: supabase-analytics_prod
  vector:
    container_name: supabase-vector_prod
  supavisor:
    container_name: supabase-pooler_prod
    ports: !reset []
  minio:
    healthcheck:
      disable: true
  minio-createbucket:
    depends_on:
      minio:
        condition: service_started
  storage:
    depends_on:
      minio-createbucket:
        condition: service_completed_successfully
      minio:
        condition: service_started
  ryvo_kafka_broker:
    ports: !reset []
  ryvo_bunqueue:
    ports: !reset []
  ryvo_redis:
    ports: !reset []
